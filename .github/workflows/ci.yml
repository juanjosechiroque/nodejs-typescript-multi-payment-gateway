name: Build Main

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: build-main-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    build:
        name: Build and validate
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint and format check
              run: npm run validate

            - name: Typecheck
              run: npm run typecheck

            - name: Build
              run: npm run build
